const labels=[{id:'y',t:'سنة'},{id:'mo',t:'شهر'},{id:'d',t:'يوم'},{id:'h',t:'ساعة'},{id:'m',t:'دقيقة'},{id:'s',t:'ثانية'}]; makeCounter('ageCounter',labels); makeCounter('loveCounter',labels);
function calc(date, prefix){const start=new Date(date),now=new Date();let y=now.getFullYear()-start.getFullYear(),mo=now.getMonth()-start.getMonth(),d=now.getDate()-start.getDate();if(d<0){mo--;d+=new Date(now.getFullYear(),now.getMonth(),0).getDate()}if(mo<0){y--;mo+=12}const diff=now-start;const h=Math.floor((diff%86400000)/3600000),m=Math.floor((diff%3600000)/60000),s=Math.floor((diff%60000)/1000);set(prefix,'y',y);set(prefix,'mo',mo);set(prefix,'d',d);set(prefix,'h',h);set(prefix,'m',m);set(prefix,'s',s)}
function set(p,k,v){const e=document.getElementById(`${p}-${k}`); const t=String(Math.max(0,v)).padStart(['h','m','s'].includes(k)?2:1,'0'); if(e.textContent!==t){e.textContent=t;e.style.transform='scale(1.1)';setTimeout(()=>e.style.transform='',150)}}
setInterval(()=>{calc(BIRTHDAY,'ageCounter');calc(LOVE,'loveCounter')},1000);calc(BIRTHDAY,'ageCounter');calc(LOVE,'loveCounter');
function go(n, play=false){$$('.page').forEach(p=>p.classList.remove('active'));$('#p'+n).classList.add('active'); if(play) startMusic(); if(n===3)setTimeout(revealPhotos,200); if(n===5) typeWrite();}
function startMusic(){const a=$('#song');a.play().catch(()=>{});$('#musicBox').classList.add('playing');$('#playBtn').textContent='Ⅱ'}
function toggleAudio(){const a=$('#song'); if(a.paused){startMusic()}else{a.pause();$('#musicBox').classList.remove('playing');$('#playBtn').textContent='▶'}}
$('#gallery').innerHTML=photos.map(u=>`<div class="photo"><img src="${u}"></div>`).join('');
function revealPhotos(){$$('.photo').forEach((p,i)=>setTimeout(()=>p.classList.add('show'),i*180))}
$$('video').forEach(v=>{v.addEventListener('play',()=>{$('#song').pause();$('#musicBox').classList.remove('playing');$('#playBtn').textContent='▶';$$('video').forEach(o=>{if(o!==v)o.pause()})});v.addEventListener('pause',()=>{if(![...$$('video')].some(x=>!x.paused))startMusic()})});
function openEnvelope(){$('#env').classList.add('env-open');$('#paper').textContent=msg1}
let typed=false;function typeWrite(){if(typed)return;typed=true;const box=$('#typeBox');box.innerHTML='';let i=0;const cur=document.createElement('span');cur.className='cursor';function step(){box.textContent=msg2.slice(0,i);box.appendChild(cur);i++;box.scrollTop=box.scrollHeight;if(i<=msg2.length)setTimeout(step,18)}step()}

setInterval(()=>particle(),280);
